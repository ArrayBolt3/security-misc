## Allow SUID to be stripped from sudo and pkexec
/usr/bin/sudo disablewhitelist
/bin/sudo disablewhitelist
/usr/bin/pkexec disablewhitelist
/bin/pkexec disablewhitelist
/usr/bin/pkexec.security-misc-orig disablewhitelist
/bin/pkexec.security-misc-orig disablewhitelist
