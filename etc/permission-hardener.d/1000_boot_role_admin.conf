only_when_role=admin

## Enable SUID on sudo and pkexec
/usr/bin/sudo 4755 root root
/bin/sudo 4755 root root
/usr/bin/pkexec 4755 root root
/bin/pkexec 4755 root root
/usr/bin/pkexec.security-misc-orig 4755 root root
/bin/pkexec.security-misc-orig 4755 root root
